# ===================================================================
# 智能运营平台 · Nginx 反向代理配置
# 职责：TLS 终止 + 静态资源 + 反向代理 + 安全头 + 限流 + gzip
# 部署：放在 nginx 容器的 /etc/nginx/conf.d/app.conf
# ===================================================================

# 上游：Flask + Gunicorn
upstream ops_backend {
    server web:5000;
    keepalive 32;
}

# 限流区：登录接口 10r/m，全局 200r/m（与 Flask-Limiter 对齐）
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=200r/m;

# HTTPS 服务（生产）
server {
    listen 80;
    server_name _;
    # ACME challenge 留口
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    # 其余一律 301 到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name _;

    # ---- TLS 证书 ----
    # 挂载到 /etc/nginx/certs/fullchain.pem 与 privkey.pem
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- 安全响应头 ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                 always;
    add_header X-Content-Type-Options    "nosniff"                    always;
    add_header X-XSS-Protection          "1; mode=block"             always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'self';" always;

    # ---- 体积上限 ----
    client_max_body_size 10m;

    # ---- gzip 压缩 ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ---- 静态资源（前端 CSS/JS）----
    # 由 nginx 直接服务，Flask 不再处理静态文件
    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }

    # ---- Prometheus 指标：仅内网放行 ----
    location = /metrics {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.0/8;
        deny all;
        proxy_pass         http://ops_backend;
        proxy_set_header   Host $host;
    }

    # ---- 健康检查：直通 ----
    location ~ ^/health(/|$) {
        proxy_pass         http://ops_backend;
        proxy_set_header   Host $host;
        access_log off;
    }

    # ---- 认证接口：单独限流 ----
    location ~ ^/api/v1/auth/(login|refresh) {
        limit_req zone=auth_zone burst=5 nodelay;
        proxy_pass         http://ops_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---- API 主路由 ----
    location /api/ {
        limit_req zone=api_zone burst=20 nodelay;
        proxy_pass         http://ops_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ---- 首页 ----
    location / {
        proxy_pass         http://ops_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
